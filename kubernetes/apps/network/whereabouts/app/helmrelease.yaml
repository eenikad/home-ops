---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ipreservations.whereabouts.cni.cncf.io
spec:
  group: whereabouts.cni.cncf.io
  names:
    kind: IPReservation
    listKind: IPReservationList
    plural: ipreservations
    singular: ipreservation
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whereabouts
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: whereabouts
  template:
    metadata:
      labels:
        name: whereabouts
    spec:
      containers:
        - name: whereabouts
          image: ghcr.io/k8snetworkplumbingwg/whereabouts:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              /usr/bin/launch-whereabouts.sh
          securityContext:
            privileged: true
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
            - name: cni-netd
              mountPath: /host/etc/cni/net.d
      hostNetwork: true
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
        - name: cni-netd
          hostPath:
            path: /etc/cni/net.d
      tolerations:
        - operator: Exists
