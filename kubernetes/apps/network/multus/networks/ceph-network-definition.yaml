---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: multus-ceph
  #namespace: default
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "multus-ceph",
      "type": "macvlan",
      "plugins": [
        {
          "type": "macvlan",
          "master": "eth3",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "routes": [
              { "dst": "0.0.0.0/0", "gw": "10.40.0.1" }
            ]
          }
        },
        {
          "type": "sbr"
        }
      ]
    }