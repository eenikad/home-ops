---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whereabouts
  namespace: network
spec:
  interval: 5m
  # chart:
  #   spec:
  #     chart: whereabouts
  #     version: 1.2.12
  #     sourceRef:
  #       kind: HelmRepository
  #       name: bitnami-oci
  #       namespace: flux-system
  chart:
    spec:
      chart: app-template
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    image:
      repository: docker.io/bitnami/whereabouts
      tag: 1.2.12
      pullPolicy: IfNotPresent
    cni:
      binDir: /opt/cni/bin
      confDir: /etc/cni/net.d
