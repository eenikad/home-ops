    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:27:d6:38"
        dhcp: false
        addresses:
          - "10.30.0.101/24"
        routes:
          - network: "0.0.0.0/0"
