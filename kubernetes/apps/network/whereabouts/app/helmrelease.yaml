---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: whereabouts
  namespace: network
spec:
  interval: 5m
  chart:
    spec:
      chart: whereabouts
      version: 1.2.11
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      repository: docker.io/bitnami/whereabouts
      tag: 1.2.11
      pullPolicy: IfNotPresent
    cni:
      binDir: /opt/cni/bin
      confDir: /etc/cni/net.d
